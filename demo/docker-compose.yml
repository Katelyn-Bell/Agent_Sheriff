services:
  backend:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    working_dir: /app/backend
    command: uv run uvicorn agentsheriff.main:app --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL: sqlite:////data/sheriff.db
      FRONTEND_ORIGIN: http://localhost:3000
      GATEWAY_ADAPTER_SECRET: dev-gateway-secret
      USE_LLM_CLASSIFIER: "false"
    ports:
      - "8000:8000"
    volumes:
      - ..:/app
      - backend-data:/data

  frontend:
    image: node:22-bookworm-slim
    working_dir: /app/frontend
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000/ws
    ports:
      - "3000:3000"
    volumes:
      - ..:/app
    depends_on:
      - backend

  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    profiles: ["openclaw"]
    environment:
      AGENTSHERIFF_GATEWAY_URL: http://backend:8000
      OPENCLAW_CONFIG_DIR: /config
    volumes:
      - ./openclaw-config:/config:ro
    depends_on:
      - backend

volumes:
  backend-data:
